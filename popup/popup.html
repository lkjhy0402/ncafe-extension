<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>NCAFE Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo">🎯 NCAFE</span>
      <span id="statusBadge" class="badge badge--off">확인 중</span>
    </header>

    <section class="section">
      <h3>⚙️ 설정</h3>
      <div class="field">
        <label>NCAFE 토큰</label>
        <div class="input-row">
          <input type="password" id="token" placeholder="토큰 붙여넣기…">
          <button id="toggleToken" class="btn-icon" title="보기/숨기기">👁</button>
        </div>
      </div>

      <div class="field">
        <label>🎭 현재 활동 페르소나</label>
        <select id="personaSelect" class="persona-select">
          <option value="">— 페르소나 선택 —</option>
        </select>
        <p class="persona-hint" id="personaHint" style="display:none">
          이 페르소나로 카페 활동이 자동 분류됩니다.
          네이버 계정 전환 시 여기도 함께 변경하세요.
        </p>
      </div>

      <button id="saveBtn" class="btn btn--primary">💾 저장</button>
      <p id="saveStatus" class="save-status"></p>
    </section>

    <section class="section" id="statsSection" style="display:none">
      <h3>📊 현재 페르소나 (오늘)</h3>
      <div class="stats">
        <div class="stat">
          <span class="stat-num" id="postsCount">0</span>
          <span class="stat-label">발행</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="collectedCount">0</span>
          <span class="stat-label">자동수집</span>
        </div>
      </div>
    </section>

    <section class="section actions">
      <button id="testBtn" class="btn">🔌 연결 테스트</button>
      <button id="openBtn" class="btn">↗ NCAFE 열기</button>
    </section>

    <div id="msg" class="msg hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
